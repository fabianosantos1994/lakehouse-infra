services:
  minio:
    image: quay.io/minio/minio
    command: server /data --console-address ":${MINIO_CONSOLE_PORT}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data  # Persistência dos dados do banco.
      - ./postgres/init:/docker-entrypoint-initdb.d  # Monta o script de inicialização para criar user/database do Hive.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 20

  hive-metastore:
    image: apache/hive:3.1.3
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVICE_NAME: metastore  # Diz que queremos subir o serviço de metastore, não outro componente do Hive.
      DB_DRIVER: postgres
      HADOOP_OPTIONAL_TOOLS: hadoop-aws
      SKIP_SCHEMA_INIT: "true"
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/metastore_db
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive123
    ports:
      - "9083:9083"
    volumes:
      - ./hive/lib/postgresql-42.7.3.jar:/opt/hive/lib/postgres.jar
      - ./hive/s3/hadoop-aws-3.1.3.jar:/opt/hadoop/share/hadoop/tools/lib/hadoop-aws-3.1.3.jar
      - ./hive/s3/aws-java-sdk-bundle-1.11.375.jar:/opt/hadoop/share/hadoop/tools/lib/aws-java-sdk-bundle-1.11.375.jar
      - ./hive/conf/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml

  spark:
    image: tabulario/spark-iceberg
    depends_on:
      - hive-metastore
      - minio
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: us-east-1
    entrypoint: ["/bin/bash", "-c", "mkdir -p /tmp/spark-events && tail -f /dev/null"]
    ports:
      - "4040:4040"
    volumes:
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - ./spark/jars/hadoop-aws-3.3.4.jar:/opt/spark/jars/hadoop-aws-3.3.4.jar
      - ./spark/jars/aws-java-sdk-bundle-1.12.262.jar:/opt/spark/jars/aws-java-sdk-bundle-1.12.262.jar

volumes:
  minio_data:
  postgres_data:
  warehouse: